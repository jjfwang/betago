<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BetaGo Chess</title>
    <link rel="stylesheet" href="/chess.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="board-card">
        <header class="board-header">
          <div>
            <div class="game-nav">
              <a href="/">Go</a>
              <span>/</span>
              <a href="/chess" class="active">Chess</a>
            </div>
            <h1>BetaGo Chess</h1>
            <p id="statusText">Loading game...</p>
          </div>
          <div class="header-actions">
            <label for="aiLevelSelect" class="level-label">Level</label>
            <select id="aiLevelSelect" class="level-select">
              <option value="entry">Entry</option>
              <option value="medium" selected>Medium</option>
              <option value="hard">Hard</option>
            </select>
            <button id="newGameBtn" class="btn ghost">New Game</button>
          </div>
        </header>

        <div class="board-wrap">
          <div id="boardGrid" class="chess-board" aria-label="Chess board"></div>
        </div>

        <div class="controls">
          <button id="resignBtn" class="btn danger">Resign</button>
        </div>

        <div id="message" class="message" aria-live="polite"></div>
      </section>

      <aside class="panel-card">
        <h2>Game Info</h2>
        <dl class="meta-grid">
          <dt>Turn</dt>
          <dd id="turnText">-</dd>
          <dt>Version</dt>
          <dd id="turnVersionText">-</dd>
          <dt>AI Status</dt>
          <dd id="aiStatusText">-</dd>
          <dt>Level</dt>
          <dd id="aiLevelText">-</dd>
          <dt>Check</dt>
          <dd id="checkText">-</dd>
          <dt>Winner</dt>
          <dd id="winnerText">-</dd>
        </dl>

        <section id="aiRationaleSection" class="hidden">
          <h3>AI Rationale</h3>
          <p id="aiRationaleText" class="ai-rationale"></p>
        </section>

        <h3>Move History</h3>
        <ol id="moveList" class="move-list"></ol>
      </aside>
    </main>

    <script type="module" src="/chess.js"></script>
  </body>
</html>
